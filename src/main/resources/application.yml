spring:
  application:
    name: payment-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8090/realms/payment-system/protocol/openid-connect/certs}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

ignite:
  instance:
    name: ${IGNITE_INSTANCE_NAME:payment-ignite}
  discovery:
    addresses: ${IGNITE_DISCOVERY_ADDRESSES:127.0.0.1:47500..47509}
  client-mode: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.apache.ignite: INFO
    com.zemnitskiy.dpps: DEBUG
